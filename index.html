<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideAssure Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="phone">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>
        
        <!-- Home Indicator -->
        <div class="home-indicator"></div>
        
        <!-- App Content -->
        <div class="app-content">
            <!-- Status Bar -->
            <div class="status-bar">
                <span>9:41</span>
                <div class="status-icons">
                    <svg width="17" height="12" viewBox="0 0 17 12">
                        <rect y="5" width="3" height="7" rx="1" fill="#fff"/>
                        <rect x="5" y="3" width="3" height="9" rx="1" fill="#fff"/>
                        <rect x="10" y="0" width="3" height="12" rx="1" fill="#fff"/>
                        <rect x="15" y="5" width="2" height="7" rx="0.5" fill="#fff" opacity=".3"/>
                    </svg>
                    <svg width="22" height="12" viewBox="0 0 22 12">
                        <rect x=".5" y=".5" width="18" height="11" rx="2.5" stroke="#fff" stroke-width=".8" fill="none"/>
                        <rect x="19.5" y="3.5" width="1.5" height="5" rx=".75" fill="#fff" opacity=".4"/>
                        <rect x="2" y="2" width="13" height="8" rx="1.2" fill="#36B37E"/>
                    </svg>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="main-content" id="mainContent">
                <!-- Content will be dynamically loaded here -->
            </div>

            <!-- Tab Bar -->
            <div class="tab-bar">
                <button class="tab-item active" data-tab="home">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5l9-7 9 7V20a2 2 0 01-2 2H5a2 2 0 01-2-2V9.5z"/>
                        <path d="M9 22V12h6v10"/>
                    </svg>
                    <span>Home</span>
                    <div class="active-indicator"></div>
                </button>
                <button class="tab-item" data-tab="history">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <span>Activity</span>
                    <div class="active-indicator"></div>
                </button>
                <button class="tab-item" data-tab="safety">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <span>Safety</span>
                    <div class="active-indicator"></div>
                </button>
                <button class="tab-item" data-tab="profile">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <path d="M12 3a4 4 0 100 8 4 4 0 000-8z"/>
                    </svg>
                    <span>Account</span>
                    <div class="active-indicator"></div>
                </button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
